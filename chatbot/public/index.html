<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chatbot</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Settings panel (hidden by default) -->
      <div id="settings-overlay" class="overlay hidden">
        <div class="settings-panel">
          <h2>Settings</h2>
          <label for="api-key-input">OpenAI API Key</label>
          <input
            type="password"
            id="api-key-input"
            placeholder="sk-..."
            autocomplete="off"
          />
          <p class="hint">
            Your key is stored only in your browser and sent directly to the
            server for proxying. It is never persisted on the server.
          </p>
          <div class="settings-actions">
            <button id="save-key-btn" class="btn-primary">Save</button>
            <button id="cancel-key-btn" class="btn-secondary">Cancel</button>
          </div>
        </div>
      </div>

      <!-- Header -->
      <header>
        <div class="header-left">
          <svg
            class="logo"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
            />
          </svg>
          <h1>AI Chatbot</h1>
        </div>
        <div class="header-right">
          <button
            id="clear-btn"
            class="icon-btn"
            title="Clear conversation"
          >
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6" />
              <path
                d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
              />
            </svg>
          </button>
          <button id="settings-btn" class="icon-btn" title="Settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
              />
            </svg>
          </button>
        </div>
      </header>

      <!-- Chat area -->
      <main id="chat-messages">
        <div class="welcome-message">
          <div class="welcome-icon">🤖</div>
          <h2>Welcome to AI Chatbot</h2>
          <p>
            Ask me anything! I can help with coding, writing, brainstorming,
            and much more.
          </p>
          <div class="suggestions">
            <button class="suggestion" data-msg="Explain how async/await works in JavaScript">
              💡 Explain async/await
            </button>
            <button class="suggestion" data-msg="Write a Python function to find prime numbers">
              🐍 Python prime numbers
            </button>
            <button class="suggestion" data-msg="What are the best practices for REST API design?">
              🌐 REST API best practices
            </button>
          </div>
        </div>
      </main>

      <!-- Input area -->
      <footer>
        <form id="chat-form">
          <div class="input-wrapper">
            <textarea
              id="message-input"
              placeholder="Type your message…"
              rows="1"
              autofocus
            ></textarea>
            <button type="submit" id="send-btn" disabled title="Send message">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
              </svg>
            </button>
          </div>
        </form>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
